default:
  tags:
    - exam-shell

stages:
  - test
  - build
  - deploy_dev
  - deploy_qa
  - deploy_staging
  - deploy_prod

variables:
  GATEWAY_IMAGE: $DOCKER_USERNAME/exam-gateway
  USERS_IMAGE: $DOCKER_USERNAME/exam-users
  ORDERS_IMAGE: $DOCKER_USERNAME/exam-orders

test-users:
  stage: test
  script:
    - >
      docker run --rm -e PYTHONDONTWRITEBYTECODE=1 -v $PWD/users:/app -w /app python:3.7.7
      sh -c "pip install --no-cache-dir -r requirements.txt
      && python -m tests.auth && python -m tests.fake_db"

build-images:
  stage: build
  script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    - docker build -t $GATEWAY_IMAGE:$CI_COMMIT_SHORT_SHA -t $GATEWAY_IMAGE:latest ./gateway
    - docker build -t $USERS_IMAGE:$CI_COMMIT_SHORT_SHA -t $USERS_IMAGE:latest ./users
    - docker build -t $ORDERS_IMAGE:$CI_COMMIT_SHORT_SHA -t $ORDERS_IMAGE:latest ./orders
    - docker push --all-tags $GATEWAY_IMAGE
    - docker push --all-tags $USERS_IMAGE
    - docker push --all-tags $ORDERS_IMAGE

.deploy-template:
  script:
    - >
      helm upgrade --install exam-app charts/exam-app
      -n $NAMESPACE
      --set image.tag=$CI_COMMIT_SHORT_SHA
      --set gateway.nodePort=$NODE_PORT
      --wait --timeout 3m
    - kubectl get pods -n $NAMESPACE

deploy-dev:
  extends: .deploy-template
  stage: deploy_dev
  variables:
    NAMESPACE: dev
    NODE_PORT: "30080"

deploy-qa:
  extends: .deploy-template
  stage: deploy_qa
  variables:
    NAMESPACE: qa
    NODE_PORT: "30081"

deploy-staging:
  extends: .deploy-template
  stage: deploy_staging
  variables:
    NAMESPACE: staging
    NODE_PORT: "30082"

deploy-prod:
  extends: .deploy-template
  stage: deploy_prod
  variables:
    NAMESPACE: prod
    NODE_PORT: "30083"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
